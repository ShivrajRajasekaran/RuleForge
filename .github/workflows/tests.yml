name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: pytest -q --cov=src

      - name: Smoke-test the analysis CLIs (no Ollama / corpus needed)
        run: |
          python -m src.analysis.conflict_detector data/conflict_samples/rate_conflict.cbl
          python -m src.analysis.completeness data/completeness_samples/incomplete_if.cbl
